# .github/workflows/deploy-docs.yml
name: deploy-docs

on:
  push:
    branches: [main] #to rename to main: 
    # Rename your default branch on GitHub: Settings → Branches → Default branch → switch to main, 
    # then locally 'git branch -m master main && git fetch && git branch -u origin/main main'.
    paths:
      - 'docs/**'
      - 'src/**'                         # Doxygen rebuilds when code changes
      - 'Doxyfile'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -------- Build the user guide (Jupyter Book + MyST) --------
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install Node.js (for MyST engine)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build user guide
        working-directory: docs/user_guide
        run: |
          uv sync --frozen
          uv run jupyter-book build --html

      # -------- Build the API reference (Doxygen) --------
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen docs
        run: doxygen Doxyfile

      # -------- Assemble combined site --------
      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/landing/index.html _site/index.html
          cp -r docs/user_guide/_build/html _site/guide
          # Adjust the source path below to match your Doxyfile's output.
          # If HTML_OUTPUT = html (common), use: docs/code_documentation/html
          # If HTML_OUTPUT = . (also common), use: docs/code_documentation
          cp -r docs/code_documentation/html _site/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4