# .github/workflows/deploy-docs.yml
name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      # - 'docs/Doxyfile'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # -------- Build the user guide (Jupyter Book + MyST) --------
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install Node.js (for MyST engine)
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build user guide
        working-directory: docs/user_guide
        run: |
          uv sync --frozen
          uv run jupyter-book build --html --base-url=/CirclePack/guide 

      # -------- Build the API reference (Doxygen) --------
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen docs
        # working-directory: docs
        run: doxygen docs/Doxyfile

      # -------- Assemble combined site --------
      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/landing/index.html _site/index.html
          cp -r docs/user_guide/_build/html _site/guide
          # Adjust source path to match your Doxyfile's HTML_OUTPUT setting.
          cp -r docs/code_documentation/html _site/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4